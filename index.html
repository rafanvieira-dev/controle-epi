<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de EPIs - Logística</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; }
        .scanner-box { border: 2px dashed #3498db; padding: 10px; margin-bottom: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .btn-saida { background-color: #e74c3c; }
        .btn-saida:hover { background-color: #c0392b; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .low-stock { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Controle de EPIs</h1>

    <div class="scanner-box">
        <div id="reader" style="width: 100%;"></div>
    </div>

    <div class="form-group">
        <label>Código do Produto (Automático via leitor ou manual):</label>
        <input type="text" id="codigo" placeholder="Ex: 7891234567890">
    </div>
    
    <div class="form-group">
        <label>Nome do EPI (Apenas para cadastro inicial):</label>
        <input type="text" id="nome" placeholder="Ex: Luva de Raspa">
    </div>

    <div class="form-group">
        <label>Quantidade:</label>
        <input type="number" id="quantidade" value="1" min="1">
    </div>

    <button onclick="registrarEntrada()">📥 Registrar Entrada (Estoque)</button>
    <button class="btn-saida" onclick="registrarSaida()">📤 Registrar Saída (Colaborador)</button>

    <h2>📊 Posição de Estoque</h2>
    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>EPI</th>
                <th>Qtd</th>
            </tr>
        </thead>
        <tbody id="estoque-corpo">
            </tbody>
    </table>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    // Inicializar o banco de dados no LocalStorage
    let estoque = JSON.parse(localStorage.getItem('epi_estoque')) || {};

    // Função para atualizar a tabela na tela
    function atualizarTabela() {
        const tbody = document.getElementById('estoque-corpo');
        tbody.innerHTML = '';
        
        for (let codigo in estoque) {
            let item = estoque[codigo];
            let row = `<tr>
                <td>${codigo}</td>
                <td>${item.nome}</td>
                <td class="${item.qtd <= 5 ? 'low-stock' : ''}">${item.qtd}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
        // Salva no LocalStorage
        localStorage.setItem('epi_estoque', JSON.stringify(estoque));
    }

    // Função de Entrada
    function registrarEntrada() {
        let codigo = document.getElementById('codigo').value;
        let nome = document.getElementById('nome').value;
        let qtd = parseInt(document.getElementById('quantidade').value);

        if (!codigo) return alert('Insira um código!');

        if (estoque[codigo]) {
            estoque[codigo].qtd += qtd; // Soma se já existe
        } else {
            if(!nome) return alert('Para um EPI novo, informe o nome!');
            estoque[codigo] = { nome: nome, qtd: qtd, estoqueMinimo: 5 }; // Cadastra novo
        }
        
        atualizarTabela();
        alert('Entrada registrada com sucesso!');
    }

    // Função de Saída
    function registrarSaida() {
        let codigo = document.getElementById('codigo').value;
        let qtd = parseInt(document.getElementById('quantidade').value);

        if (!codigo) return alert('Insira um código!');
        if (!estoque[codigo]) return alert('EPI não encontrado no estoque!');
        if (estoque[codigo].qtd < qtd) return alert('Estoque insuficiente!');

        estoque[codigo].qtd -= qtd;
        atualizarTabela();
        alert('Saída registrada com sucesso!');
    }

    // Configuração do Leitor de Código de Barras
    function onScanSuccess(decodedText, decodedResult) {
        // Preenche o campo de código automaticamente e toca um som suave se quiser implementar depois
        document.getElementById('codigo').value = decodedText;
    }

    function onScanFailure(error) {
        // Silenciado para não poluir o console enquanto tenta ler
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: {width: 250, height: 100} },
        /* verbose= */ false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);

    // Carrega a tabela ao abrir a página
    atualizarTabela();
</script>

</body>
</html>
